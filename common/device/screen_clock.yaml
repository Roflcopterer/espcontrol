# =============================================================================
# CLOCK SCREENSAVER - Full-screen clock overlay for idle display
# =============================================================================

font:
  - file: "gfonts://Roboto@Bold"
    id: clock_screensaver_font
    size: ${clock_font_size}
    bpp: 4
    glyphs: " 0123456789:"

lvgl:
  top_layer:
    widgets:

      # ---------------------------------------------------------------------
      # BACKGROUND IMAGE LAYER (OPTIONAL - SAFE LVGL RENDER ONLY)
      # ---------------------------------------------------------------------
      - image:
          id: clock_screensaver_background
          src: clock_bg_image
          x: 0
          y: 0
          width: ${screen_width}
          height: ${screen_height}
          hidden: true

      # ---------------------------------------------------------------------
      # DARK OVERLAY (keeps clock readable)
      # ---------------------------------------------------------------------
      - obj:
          id: clock_screensaver_overlay
          x: 0
          y: 0
          width: ${screen_width}
          height: ${screen_height}
          bg_color: 0x0000FF
          bg_opa: 50%
          radius: 0
          border_width: 0
          pad_all: 0
          scrollable: false
          clickable: false
          hidden: true

      # ---------------------------------------------------------------------
      # CLOCK TEXT
      # ---------------------------------------------------------------------
      - obj:
          id: clock_screensaver
          x: 0
          y: 0
          width: ${screen_width}
          height: ${screen_height}
          bg_opa: 0%
          radius: 0
          border_width: 0
          pad_all: 0
          scrollable: false
          clickable: false
          hidden: true
          widgets:
            - label:
                id: clock_label
                text_font: clock_screensaver_font
                text_color: 0xFFFFFF
                text: "00:00"
                align: center

      # ---------------------------------------------------------------------
      # TOUCH GUARD (wake screen)
      # ---------------------------------------------------------------------
      - obj:
          id: dim_screensaver_touch_guard
          x: 0
          y: 0
          width: ${screen_width}
          height: ${screen_height}
          bg_opa: 0%
          radius: 0
          border_width: 0
          pad_all: 0
          scrollable: false
          clickable: true
          hidden: true
          on_press:
            then:
              - script.execute: screensaver_wake
